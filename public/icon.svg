<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F1838"/>
      <stop offset="55%" stop-color="#3A2D6E"/>
      <stop offset="100%" stop-color="#7A65D6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sfondo iOS-rounded -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Soft inner glow -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Cerchio dell'evo (orbita) -->
  <circle cx="256" cy="256" r="124" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- Punto del Sé -->
  <circle cx="256" cy="256" r="18" fill="#FFFFFF" filter="url(#dotGlow)"/>

  <!-- Sottile highlight superiore (effetto Liquid Glass) -->
  <path d="M 138 168 Q 256 116 374 168" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.18" stroke-linecap="round"/>
</svg>
